<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/logo.png" />
    <link rel="stylesheet" href="style/css/main.css" />

    <title>IP Address Tracker</title>
  </head>

  <body>
    <div class="blue-background"></div>

    <main>
      <h1>IP Address Tracker</h1>

      <!-- Search Form -->
      <form action="" aria-label="Search for IP address or domain">
        <label for="ip-input" class="sr-only">IP address or domain</label>

        <input
          id="ip-input"
          type="text"
          required
          name="ip_address"
          placeholder="Search for any IP address or domain"
        />

        <button type="submit" aria-label="Search IP or domain">
          <img src="images/icon-arrow.svg" alt="" aria-hidden="true" />
        </button>
      </form>

      <!-- IP Data -->
      <section id="ip-data" aria-live="polite">
        <div class="loading" aria-hidden="true"></div>

        <article>
          <h2>IP Address</h2>
          <p id="ip-address"></p>
        </article>

        <article>
          <h2>Location</h2>
          <p id="location"></p>
        </article>

        <article>
          <h2>Timezone</h2>
          <p id="timezone"></p>
        </article>

        <article>
          <h2>ISP</h2>
          <p id="isp"></p>
        </article>
      </section>
    </main>

    <!-- Map -->
    <div
      id="map"
      role="region"
      aria-label="Interactive map showing IP location"
    ></div>

    <!-- Attribution -->
    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
      >
        Frontend Mentor </a
      >. Coded by
      <a
        href="https://mahmoudessam16.github.io/Main-portfolio/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Mahmoud Essam </a
      >.
    </footer>

    <!-- Scripts -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/script.js"></script>
  </body>
</html>
